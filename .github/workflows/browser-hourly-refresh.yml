name: Browser-created hourly refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "47 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run tests
        run: npm test
      - name: Refresh market snapshot
        run: npm run refresh
        env:
          PREVIOUS_MARKET_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/market.json
          SKIP_OHLCV: "1"
      - name: Validate market snapshot
        run: npm run validate
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
